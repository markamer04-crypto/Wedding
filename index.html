<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Day</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="hero">
        <div id="petal-container"></div>
        <h1>Our Story</h1>
        <div class="subtitle">Join us in celebrating our journey</div>
        <p>Save the Date</p>
        <div class="scroll-indicator"><span></span></div>
    </header>

    <section id="gallery">
        <h2>Captured Moments</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="wedding (1).jpeg" alt="Photo 1"><div class="photo-overlay">Moment 1</div></div>
            <div class="gallery-item"><img src="wedding(2).jpeg" alt="Photo 2"><div class="photo-overlay">Moment 2</div></div>
            <div class="gallery-item"><img src="wedding(3).jpeg" alt="Photo 3"><div class="photo-overlay">Moment 3</div></div>
            <div class="gallery-item"><img src="wedding(4).jpeg" alt="Photo 4"><div class="photo-overlay">Moment 4</div></div>
            <div class="gallery-item"><img src="wedding(5).jpeg" alt="Photo 5"><div class="photo-overlay">Moment 5</div></div>
            <div class="gallery-item"><img src="wedding(6).jpeg" alt="Photo 6"><div class="photo-overlay">Moment 6</div></div>
            <div class="gallery-item"><img src="wedding(7).jpeg" alt="Photo 7"><div class="photo-overlay">Moment 7</div></div>
            <div class="gallery-item"><img src="wedding(8).jpeg" alt="Photo 8"><div class="photo-overlay">Moment 8</div></div>
            <div class="gallery-item"><img src="wedding(9).jpeg" alt="Photo 9"><div class="photo-overlay">Moment 9</div></div>
            <div class="gallery-item"><img src="wedding(10).jpeg" alt="Photo 10"><div class="photo-overlay">Moment 10</div></div>
            <div class="gallery-item"><img src="wedding(11).jpeg" alt="Photo 11"><div class="photo-overlay">Moment 11</div></div>
            <div class="gallery-item"><img src="wedding(12).jpeg" alt="Photo 12"><div class="photo-overlay">Moment 12</div></div>
            <div class="gallery-item"><img src="wedding(13).jpeg" alt="Photo 13"><div class="photo-overlay">Moment 13</div></div>
            <div class="gallery-item"><img src="wedding(14).jpeg" alt="Photo 14"><div class="photo-overlay">Moment 14</div></div>
            <div class="gallery-item"><img src="wedding(15).jpeg" alt="Photo 15"><div class="photo-overlay">Moment 15</div></div>
            <div class="gallery-item"><img src="wedding(16).jpeg" alt="Photo 16"><div class="photo-overlay">Moment 16</div></div>
        </div>
    </section>

    <section id="rsvp">
        <h2>Will You Join Us?</h2>
        <form class="rsvp-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <select>
                <option value="yes">Yes, I'll be there!</option>
                <option value="no">Sadly, I can't make it</option>
            </select>
            <button type="submit">Send RSVP</button>
        </form>
    </section>

    <footer>
        <p>Created with Love &copy; 2026</p>
    </footer>

    <script>
        function createPetal() {
            const container = document.getElementById('petal-container');
            if(!container) return;
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 5 + 7 + 's';
            container.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 12000);
        }
        setInterval(createPetal, 300);
    </script>

</body>
</html>
