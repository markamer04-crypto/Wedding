<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Day</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="hero">
        <div id="petal-container"></div>
        <h1>Our Story</h1>
        <div class="subtitle">Join us in celebrating our journey</div>
        <p>Save the Date</p>
        <div class="scroll-indicator"><span></span></div>
    </header>

    <section id="countdown-section">
    <h2>Days until we say "I Do"</h2>
    <div id="countdown">
        <div class="time-box"><span id="days">00</span><p>Days</p></div>
        <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
        <div class="time-box"><span id="minutes">00</span><p>Min</p></div>
    </div>
</section>

<section id="gallery">
    <h2>Captured Moments</h2>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="wedding(1).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(2).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(3).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(4).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(5).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(6).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(7).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(8).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(9).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(10).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(11).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(12).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(13).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(14).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(15).jpeg"></div>
            <div class="swiper-slide"><img src="wedding(16).jpeg"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
</section>

<script>
    // --- Countdown Logic ---
    const weddingDate = new Date("April 16, 2026 15:00:00").getTime(); // SET YOUR DATE HERE

    setInterval(function() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    }, 1000);

    // --- Swiper Slider Logic ---
    const swiper = new Swiper('.swiper', {
        effect: 'coverflow', // Makes it look elegant
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: 'auto',
        coverflowEffect: {
            rotate: 50,
            stretch: 0,
            depth: 100,
            modifier: 1,
            slideShadows: true,
        },
        pagination: { el: '.swiper-pagination' },
    });
</script>
</body>
</html>
